<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="icon" href="../wwwroot/pixil-frame-0(1).png" />

    <title>Nossos Momentos</title>

    <style>
      body {
        background: black;
        font-family: Arial, sans-serif;
      }

      .carousel-item img {
        max-height: 400px;
        object-fit: cover;
      }
    </style>
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100">

      </h1>

        <div class="col-md-6">

              <div class="carousel-item active">
                <img src="#" class="d-block w-100" alt="Foto 1" />
              </div>
              <div class="carousel-item">

              </div>
              <div class="carousel-item">
                <img src="#" class="d-block w-100" alt="Foto 3" />
              </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#Fotos" data-bs-slide="prev">
              <span class="carousel-control-prev-icon"> </span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#Fotos" data-bs-slide="next">
              <span class="carousel-control-next-icon"> </span>
            </button>
          </div>
        </div>
        <div class="col-md-6">
          <div id="Mensagens" class="carousel slide" data-bs-ride="carousel">

                </div>
              </div>

                </div>

              <div class="carousel-item">
                <div class="d-flex justify-content-center align-items-center h-100">
                  <h2>Te Amo meu amor3</h2>
                </div>
              </div>
              <div class="carousel-item">
                <div class="d-flex justify-content-center align-items-center h-100">
                  <h2>Te Amo meu amor4</h2>
                </div>
              </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#Mensagens" data-bs-slide="prev">
              <span class="carousel-control-prev-icon"> </span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#Mensagens" data-bs-slide="next">
              <span class="carousel-control-next-icon"> </span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../javascript/landingpage.js"></script>
</html>
